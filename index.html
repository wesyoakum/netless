<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netless — Remove Baseball Netting</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #111; color: #eee; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
  }

  .header-bar {
    width: 100%; padding: 1rem 0; text-align: center;
    background: #e74c3c; /* change this color each commit to verify deploy */
  }

  h1 { margin: 0.25rem 0 0.15rem; font-size: 1.8rem; letter-spacing: -0.02em; }
  .subtitle { color: rgba(255,255,255,0.7); margin-bottom: 0; font-size: 0.95rem; }

  .controls {
    background: #1a1a1a; border: 1px solid #333; border-radius: 10px;
    padding: 1.25rem 1.5rem; width: 100%; max-width: 820px;
    display: flex; flex-wrap: wrap; gap: 1rem; align-items: end;
  }

  .control-group { display: flex; flex-direction: column; gap: 0.3rem; }
  .control-group label { font-size: 0.8rem; color: #aaa; }
  .control-group .value { font-size: 0.75rem; color: #666; text-align: right; }

  input[type="range"] {
    width: 130px; accent-color: #4a9eff;
  }

  .file-label {
    display: inline-block; padding: 0.55rem 1.2rem;
    background: #4a9eff; color: #fff; border-radius: 6px;
    cursor: pointer; font-size: 0.9rem; font-weight: 500;
    transition: background 0.15s;
  }
  .file-label:hover { background: #3a8bee; }
  .file-label input { display: none; }

  .btn {
    padding: 0.55rem 1.2rem; border: none; border-radius: 6px;
    font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: background 0.15s;
  }
  .btn-process { background: #2ecc71; color: #fff; }
  .btn-process:hover { background: #27ae60; }
  .btn-process:disabled { background: #555; cursor: not-allowed; }
  .btn-save { background: #333; color: #ccc; border: 1px solid #555; }
  .btn-save:hover { background: #444; }
  .btn-save:disabled { background: #222; color: #555; border-color: #333; cursor: not-allowed; }

  .checkbox-group {
    display: flex; align-items: center; gap: 0.4rem;
    font-size: 0.85rem; color: #aaa;
  }
  .checkbox-group input { accent-color: #4a9eff; }

  .canvas-area {
    margin: 1.5rem 0; width: 100%; max-width: 820px;
    display: flex; flex-direction: column; gap: 1rem;
  }

  .canvas-row {
    display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;
  }

  .canvas-box {
    flex: 1; min-width: 250px; max-width: 400px;
    background: #1a1a1a; border: 1px solid #333; border-radius: 8px;
    overflow: hidden;
  }
  .canvas-box .label {
    padding: 0.4rem 0.75rem; font-size: 0.75rem; color: #888;
    background: #222; border-bottom: 1px solid #333;
  }
  .canvas-box canvas {
    display: block; width: 100%; height: auto;
  }

  .progress-bar-container {
    width: 100%; max-width: 820px; margin: 0.5rem 0;
    background: #222; border-radius: 6px; overflow: hidden; height: 24px;
    display: none; position: relative;
  }
  .progress-bar-fill {
    height: 100%; background: #4a9eff; transition: width 0.1s; width: 0%;
  }
  .progress-bar-text {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; color: #fff;
  }

  .status {
    font-size: 0.85rem; color: #888; margin: 0.5rem 0; min-height: 1.2em;
    width: 100%; max-width: 820px; text-align: center;
  }

  .hidden-video { display: none; }
</style>
</head>
<body>

<div class="header-bar">
  <h1>Netless</h1>
  <p class="subtitle">Remove baseball netting from images and videos</p>
</div>

<div class="controls" style="margin-top:1.5rem;">
  <label class="file-label">
    Choose File
    <input type="file" id="fileInput" accept="image/*,video/*">
  </label>

  <div class="control-group">
    <label>Threshold <span class="value" id="thresholdVal">60</span></label>
    <input type="range" id="threshold" min="10" max="150" value="60">
  </div>

  <div class="control-group">
    <label>Radius <span class="value" id="radiusVal">0.7%</span></label>
    <input type="range" id="radius" min="1" max="30" value="7" step="1">
  </div>

  <div class="control-group">
    <label>Morph Size <span class="value" id="morphSizeVal">1.5%</span></label>
    <input type="range" id="morphSize" min="3" max="50" value="15" step="1">
  </div>

  <div class="control-group">
    <label>Dilate <span class="value" id="dilateVal">0.2%</span></label>
    <input type="range" id="dilate" min="0" max="10" value="2" step="1">
  </div>

  <div class="control-group">
    <label>Scale <span class="value" id="scaleVal">50%</span></label>
    <input type="range" id="scale" min="25" max="100" value="50" step="25">
  </div>

  <div class="control-group">
    <label>Method</label>
    <select id="method" style="padding:0.35rem 0.5rem; border-radius:4px; background:#333; color:#eee; border:1px solid #555; font-size:0.85rem;">
      <option value="diffusion">Diffusion (fast)</option>
      <option value="telea" selected>Telea</option>
      <option value="ns">Navier-Stokes</option>
      <option value="fft">FFT (spectral)</option>
    </select>
  </div>

  <div class="checkbox-group">
    <input type="checkbox" id="showMask" checked> <label for="showMask">Show Mask</label>
  </div>

  <button class="btn btn-process" id="processBtn" disabled>Process</button>
  <button class="btn btn-save" id="saveBtn" disabled>Save Result</button>
</div>

<p class="status" id="status">Loading OpenCV.js...</p>

<div class="progress-bar-container" id="progressBar">
  <div class="progress-bar-fill" id="progressFill"></div>
  <div class="progress-bar-text" id="progressText"></div>
</div>

<div class="canvas-area">
  <div class="canvas-row" id="maskRow" style="display:flex;">
    <div class="canvas-box" style="max-width: 400px;">
      <div class="label">Detected Net Mask</div>
      <canvas id="canvasMask"></canvas>
    </div>
  </div>
  <div class="canvas-row">
    <div class="canvas-box">
      <div class="label">Original</div>
      <canvas id="canvasOriginal"></canvas>
    </div>
    <div class="canvas-box">
      <div class="label">Result</div>
      <canvas id="canvasResult"></canvas>
    </div>
  </div>
</div>

<video id="hiddenVideo" class="hidden-video" muted></video>

<script>
// --- State ---
let cvReady = false;
let currentFile = null;
let processing = false;

// --- DOM refs ---
const fileInput = document.getElementById("fileInput");
const processBtn = document.getElementById("processBtn");
const saveBtn = document.getElementById("saveBtn");
const statusEl = document.getElementById("status");
const progressBar = document.getElementById("progressBar");
const progressFill = document.getElementById("progressFill");
const progressText = document.getElementById("progressText");
const showMaskCb = document.getElementById("showMask");
const maskRow = document.getElementById("maskRow");

const canvasOrig = document.getElementById("canvasOriginal");
const canvasRes = document.getElementById("canvasResult");
const canvasMask = document.getElementById("canvasMask");
const ctxOrig = canvasOrig.getContext("2d");
const ctxRes = canvasRes.getContext("2d");
const ctxMask = canvasMask.getContext("2d");

const hiddenVideo = document.getElementById("hiddenVideo");

const methodEl = document.getElementById("method");

// Slider value displays — threshold is absolute, others show as %
const thresholdEl = document.getElementById("threshold");
const thresholdValEl = document.getElementById("thresholdVal");
thresholdEl.addEventListener("input", () => { thresholdValEl.textContent = thresholdEl.value; });

const pctSliders = ["radius", "morphSize", "dilate"];
pctSliders.forEach(id => {
  const el = document.getElementById(id);
  const valEl = document.getElementById(id + "Val");
  el.addEventListener("input", () => { valEl.textContent = (el.value / 10).toFixed(1) + "%"; });
});

const scaleEl = document.getElementById("scale");
const scaleValEl = document.getElementById("scaleVal");
scaleEl.addEventListener("input", () => { scaleValEl.textContent = scaleEl.value + "%"; });

showMaskCb.addEventListener("change", () => {
  maskRow.style.display = showMaskCb.checked ? "flex" : "none";
});

// --- Params helper ---
// radius, morphSize, dilate are stored as tenths-of-percent (slider value / 10 = %)
// Actual pixel values are computed from the shorter image dimension at process time.
function getParams() {
  return {
    threshold: parseInt(thresholdEl.value),
    radiusPct: parseInt(document.getElementById("radius").value) / 1000,
    morphSizePct: parseInt(document.getElementById("morphSize").value) / 1000,
    dilatePct: parseInt(document.getElementById("dilate").value) / 1000,
    scale: parseInt(scaleEl.value) / 100,
    method: methodEl.value,
    showMask: showMaskCb.checked,
  };
}

// Convert percentage params to pixel values based on image dimensions
function resolveParams(params, width, height) {
  const ref = Math.min(width, height);
  let morphSize = Math.max(3, Math.round(params.morphSizePct * ref));
  if (morphSize % 2 === 0) morphSize++; // must be odd
  return {
    threshold: params.threshold,
    radius: Math.max(1, Math.round(params.radiusPct * ref)),
    morphSize: morphSize,
    dilate: Math.max(0, Math.round(params.dilatePct * ref)),
    method: params.method,
    showMask: params.showMask,
    scale: params.scale,
  };
}

// --- Net mask detection (same algorithm as Python version) ---
function buildNetMask(src, params) {
  const gray = new cv.Mat();
  cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

  const darkMask = new cv.Mat();
  cv.threshold(gray, darkMask, params.threshold, 255, cv.THRESH_BINARY_INV);
  gray.delete();

  const kernel = cv.getStructuringElement(
    cv.MORPH_ELLIPSE,
    new cv.Size(params.morphSize, params.morphSize)
  );
  const opened = new cv.Mat();
  cv.morphologyEx(darkMask, opened, cv.MORPH_OPEN, kernel);
  kernel.delete();

  const netMask = new cv.Mat();
  cv.subtract(darkMask, opened, netMask);
  darkMask.delete();
  opened.delete();

  if (params.dilate > 0) {
    const dilateKernel = cv.getStructuringElement(
      cv.MORPH_ELLIPSE, new cv.Size(3, 3)
    );
    cv.dilate(netMask, netMask, dilateKernel, new cv.Point(-1, -1), params.dilate);
    dilateKernel.delete();
  }

  return netMask;
}

// --- Fill methods ---

function fillDiffusion(src, netMask, radius) {
  // Iterative diffusion: repeatedly blur, then replace only masked pixels.
  // Each pass, surrounding clean pixels bleed further into net regions.
  const result = src.clone();
  const ksize = Math.max(radius * 4 + 1, 5);
  for (let i = 0; i < 15; i++) {
    const blurred = new cv.Mat();
    cv.GaussianBlur(result, blurred, new cv.Size(ksize, ksize), 0);
    blurred.copyTo(result, netMask);
    blurred.delete();
  }
  return result;
}

function fillTelea(src, netMask, radius) {
  const bgr = new cv.Mat();
  cv.cvtColor(src, bgr, cv.COLOR_RGBA2BGR);
  const inpainted = new cv.Mat();
  cv.inpaint(bgr, netMask, inpainted, radius, cv.INPAINT_TELEA);
  bgr.delete();
  const rgba = new cv.Mat();
  cv.cvtColor(inpainted, rgba, cv.COLOR_BGR2RGBA);
  inpainted.delete();
  return rgba;
}

function fillNavierStokes(src, netMask, radius) {
  const bgr = new cv.Mat();
  cv.cvtColor(src, bgr, cv.COLOR_RGBA2BGR);
  const inpainted = new cv.Mat();
  cv.inpaint(bgr, netMask, inpainted, radius, cv.INPAINT_NS);
  bgr.delete();
  const rgba = new cv.Mat();
  cv.cvtColor(inpainted, rgba, cv.COLOR_BGR2RGBA);
  inpainted.delete();
  return rgba;
}

function fillFFT(src, netMask, radius) {
  // Process each color channel independently in the frequency domain.
  // For each channel: FFT, suppress high-energy frequencies that correspond
  // to the net's repeating pattern, inverse FFT, then blend only masked pixels.
  const channels = new cv.MatVector();
  cv.split(src, channels);

  const resultChannels = new cv.MatVector();

  for (let c = 0; c < 3; c++) { // skip alpha
    const chan = channels.get(c);

    // Pad to optimal DFT size
    const rows = cv.getOptimalDFTSize(chan.rows);
    const cols = cv.getOptimalDFTSize(chan.cols);
    const padded = new cv.Mat();
    cv.copyMakeBorder(chan, padded, 0, rows - chan.rows, 0, cols - chan.cols,
      cv.BORDER_CONSTANT, new cv.Scalar(0));

    // Build complex plane (real + zeros for imaginary)
    const planes = new cv.MatVector();
    const floatPadded = new cv.Mat();
    padded.convertTo(floatPadded, cv.CV_32F);
    const zeros = cv.Mat.zeros(padded.rows, padded.cols, cv.CV_32F);
    planes.push_back(floatPadded);
    planes.push_back(zeros);
    const complex = new cv.Mat();
    cv.merge(planes, complex);

    // Forward DFT
    cv.dft(complex, complex);

    // Split into magnitude and phase
    const dftPlanes = new cv.MatVector();
    cv.split(complex, dftPlanes);
    const re = dftPlanes.get(0);
    const im = dftPlanes.get(1);
    const mag = new cv.Mat();
    cv.magnitude(re, im, mag);

    // Build a notch filter: suppress frequency bins with magnitude far above
    // the local median — these correspond to the periodic net pattern.
    // Use a threshold based on mean + k * stddev of the log-magnitude.
    const logMag = new cv.Mat();
    const ones = cv.Mat.ones(mag.rows, mag.cols, cv.CV_32F);
    cv.add(mag, ones, logMag);
    cv.log(logMag, logMag);
    ones.delete();

    const mean = new cv.Mat();
    const stddev = new cv.Mat();
    cv.meanStdDev(logMag, mean, stddev);
    const mu = mean.doubleAt(0, 0);
    const sigma = stddev.doubleAt(0, 0);
    const cutoff = mu + 2.5 * sigma; // suppress peaks > 2.5 stddev above mean

    // Create suppression mask: attenuate high-energy bins
    // Keep DC component (0,0) untouched
    const suppressionFactor = 0.05; // reduce peaks to 5% of original
    const reData = re.data32F;
    const imData = im.data32F;
    const logData = logMag.data32F;
    const dcRadius = Math.max(3, Math.round(Math.min(rows, cols) * 0.01));

    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        const idx = y * cols + x;
        // Skip DC neighborhood
        if (y < dcRadius && x < dcRadius) continue;
        if (y < dcRadius && x >= cols - dcRadius) continue;
        if (y >= rows - dcRadius && x < dcRadius) continue;
        if (y >= rows - dcRadius && x >= cols - dcRadius) continue;

        if (logData[idx] > cutoff) {
          reData[idx] *= suppressionFactor;
          imData[idx] *= suppressionFactor;
        }
      }
    }

    // Rebuild complex and inverse DFT
    const filteredPlanes = new cv.MatVector();
    filteredPlanes.push_back(re);
    filteredPlanes.push_back(im);
    const filtered = new cv.Mat();
    cv.merge(filteredPlanes, filtered);
    cv.dft(filtered, filtered, cv.DFT_INVERSE | cv.DFT_SCALE);

    // Extract real part
    const outPlanes = new cv.MatVector();
    cv.split(filtered, outPlanes);
    const realPart = outPlanes.get(0);

    // Crop back to original size and convert to 8-bit
    const cropped = realPart.roi(new cv.Rect(0, 0, chan.cols, chan.rows));
    const chan8 = new cv.Mat();
    cropped.convertTo(chan8, cv.CV_8U);

    resultChannels.push_back(chan8);

    // Cleanup
    padded.delete(); floatPadded.delete(); zeros.delete();
    planes.delete(); complex.delete(); dftPlanes.delete();
    mag.delete(); logMag.delete(); mean.delete(); stddev.delete();
    filteredPlanes.delete(); filtered.delete(); outPlanes.delete();
    chan8.delete();
  }

  // Keep original alpha channel
  resultChannels.push_back(channels.get(3));

  const fftResult = new cv.Mat();
  cv.merge(resultChannels, fftResult);

  // Blend: use FFT result only where mask is set, keep original elsewhere
  const result = src.clone();
  fftResult.copyTo(result, netMask);

  channels.delete(); resultChannels.delete(); fftResult.delete();
  return result;
}

function fillFrame(src, netMask, radius, method) {
  switch (method) {
    case "diffusion": return fillDiffusion(src, netMask, radius);
    case "telea":     return fillTelea(src, netMask, radius);
    case "ns":        return fillNavierStokes(src, netMask, radius);
    case "fft":       return fillFFT(src, netMask, radius);
    default:          return fillTelea(src, netMask, radius);
  }
}

// --- Process single image ---
function processImage() {
  const rawParams = getParams();
  const t0 = performance.now();

  const fullSrc = cv.imread(canvasOrig);

  // Downscale if scale < 1
  let src;
  if (rawParams.scale < 1) {
    src = new cv.Mat();
    const w = Math.round(fullSrc.cols * rawParams.scale);
    const h = Math.round(fullSrc.rows * rawParams.scale);
    cv.resize(fullSrc, src, new cv.Size(w, h), 0, 0, cv.INTER_AREA);
  } else {
    src = fullSrc.clone();
  }

  // Resolve % params to pixel values based on working resolution
  const params = resolveParams(rawParams, src.cols, src.rows);

  const netMask = buildNetMask(src, params);
  const result = fillFrame(src, netMask, params.radius, params.method);

  // Upscale result back to original size if needed
  let finalResult;
  if (rawParams.scale < 1) {
    finalResult = new cv.Mat();
    cv.resize(result, finalResult, new cv.Size(fullSrc.cols, fullSrc.rows), 0, 0, cv.INTER_LINEAR);
  } else {
    finalResult = result.clone();
  }

  cv.imshow(canvasRes, finalResult);

  if (params.showMask) {
    // Upscale mask for display
    if (rawParams.scale < 1) {
      const fullMask = new cv.Mat();
      cv.resize(netMask, fullMask, new cv.Size(fullSrc.cols, fullSrc.rows), 0, 0, cv.INTER_NEAREST);
      cv.imshow(canvasMask, fullMask);
      fullMask.delete();
    } else {
      cv.imshow(canvasMask, netMask);
    }
  }

  const elapsed = ((performance.now() - t0) / 1000).toFixed(1);
  statusEl.textContent = `Done in ${elapsed}s.`;

  fullSrc.delete();
  src.delete();
  netMask.delete();
  result.delete();
  finalResult.delete();
  saveBtn.disabled = false;
}

// --- Seek helper that always resolves ---
function seekTo(video, time) {
  return new Promise((resolve) => {
    const target = Math.min(time, video.duration);
    // If already at this time (or close enough), resolve immediately
    if (Math.abs(video.currentTime - target) < 0.001) {
      resolve();
      return;
    }
    video.onseeked = () => {
      video.onseeked = null;
      resolve();
    };
    video.currentTime = target;
  });
}

// --- Process video frame by frame ---
async function processVideo() {
  const rawParams = getParams();
  const fps = 30;
  const duration = hiddenVideo.duration;
  const totalFrames = Math.floor(duration * fps);
  const frameInterval = 1 / fps;

  const w = hiddenVideo.videoWidth;
  const h = hiddenVideo.videoHeight;

  // Compute working resolution and resolve params once
  const workW = Math.round(w * rawParams.scale);
  const workH = Math.round(h * rawParams.scale);
  const params = resolveParams(rawParams, workW, workH);

  canvasRes.width = w;
  canvasRes.height = h;
  if (params.showMask) {
    canvasMask.width = w;
    canvasMask.height = h;
  }

  const tmpCanvas = document.createElement("canvas");
  tmpCanvas.width = w;
  tmpCanvas.height = h;
  const tmpCtx = tmpCanvas.getContext("2d");

  // MediaRecorder to capture the result canvas as a video
  const stream = canvasRes.captureStream(0);
  const recorder = new MediaRecorder(stream, {
    mimeType: getSupportedMimeType(),
    videoBitsPerSecond: 8000000,
  });
  const chunks = [];
  recorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
  const recorderDone = new Promise((resolve) => {
    recorder.onstop = () => {
      window._processedVideoBlob = new Blob(chunks, { type: recorder.mimeType });
      resolve();
    };
  });
  recorder.start();

  progressBar.style.display = "block";

  // Reset to start before processing
  await seekTo(hiddenVideo, 0);

  for (let frameNum = 0; frameNum < totalFrames; frameNum++) {
    const seekTime = frameNum * frameInterval;
    await seekTo(hiddenVideo, seekTime);

    tmpCtx.drawImage(hiddenVideo, 0, 0, w, h);

    const fullSrc = cv.imread(tmpCanvas);
    let src;
    if (rawParams.scale < 1) {
      src = new cv.Mat();
      cv.resize(fullSrc, src, new cv.Size(workW, workH), 0, 0, cv.INTER_AREA);
    } else {
      src = fullSrc.clone();
    }

    const netMask = buildNetMask(src, params);
    const result = fillFrame(src, netMask, params.radius, params.method);

    let finalResult;
    if (rawParams.scale < 1) {
      finalResult = new cv.Mat();
      cv.resize(result, finalResult, new cv.Size(w, h), 0, 0, cv.INTER_LINEAR);
    } else {
      finalResult = result.clone();
    }

    cv.imshow(canvasRes, finalResult);
    const track = stream.getVideoTracks()[0];
    if (track.requestFrame) track.requestFrame();

    if (params.showMask) {
      cv.imshow(canvasMask, netMask);
    }

    // Show original on last frame
    canvasOrig.width = w;
    canvasOrig.height = h;
    ctxOrig.drawImage(hiddenVideo, 0, 0, w, h);

    fullSrc.delete();
    src.delete();
    netMask.delete();
    result.delete();
    finalResult.delete();

    const pct = ((frameNum + 1) / totalFrames * 100).toFixed(1);
    progressFill.style.width = pct + "%";
    progressText.textContent = `Frame ${frameNum + 1} / ${totalFrames} (${pct}%)`;
    statusEl.textContent = `Processing frame ${frameNum + 1} / ${totalFrames}...`;

    // Yield to browser for UI updates
    await new Promise((r) => setTimeout(r, 0));
  }

  recorder.stop();
  await recorderDone;

  progressBar.style.display = "none";
  statusEl.textContent = "Done. Video ready to save.";
  saveBtn.disabled = false;
}

function getSupportedMimeType() {
  const types = ["video/webm;codecs=vp9", "video/webm;codecs=vp8", "video/webm", "video/mp4"];
  for (const t of types) {
    if (MediaRecorder.isTypeSupported(t)) return t;
  }
  return "video/webm";
}

// --- File loading ---
fileInput.addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  currentFile = file;
  saveBtn.disabled = true;
  window._processedVideoBlob = null;

  if (file.type.startsWith("image/")) {
    const img = new Image();
    img.onload = () => {
      canvasOrig.width = img.width;
      canvasOrig.height = img.height;
      canvasRes.width = img.width;
      canvasRes.height = img.height;
      if (showMaskCb.checked) {
        canvasMask.width = img.width;
        canvasMask.height = img.height;
      }
      ctxOrig.drawImage(img, 0, 0);
      ctxRes.clearRect(0, 0, img.width, img.height);
      statusEl.textContent = `Loaded image: ${img.width}x${img.height}`;
      processBtn.disabled = !cvReady;
      URL.revokeObjectURL(img.src);
    };
    img.src = URL.createObjectURL(file);
  } else if (file.type.startsWith("video/")) {
    const url = URL.createObjectURL(file);
    hiddenVideo.src = url;
    hiddenVideo.onloadedmetadata = () => {
      const w = hiddenVideo.videoWidth;
      const h = hiddenVideo.videoHeight;
      canvasOrig.width = w;
      canvasOrig.height = h;
      statusEl.textContent = `Loaded video: ${w}x${h}, ${hiddenVideo.duration.toFixed(1)}s`;
      processBtn.disabled = !cvReady;
    };
  } else {
    statusEl.textContent = "Unsupported file type.";
  }
});

// --- Process button ---
processBtn.addEventListener("click", async () => {
  if (processing || !currentFile) return;
  processing = true;
  processBtn.disabled = true;
  saveBtn.disabled = true;
  statusEl.textContent = "Processing...";

  // Show mask row if checkbox is checked
  maskRow.style.display = showMaskCb.checked ? "flex" : "none";

  try {
    if (currentFile.type.startsWith("image/")) {
      processImage();
    } else if (currentFile.type.startsWith("video/")) {
      await processVideo();
    }
  } catch (err) {
    statusEl.textContent = "Error: " + err.message;
    console.error(err);
  }

  processing = false;
  processBtn.disabled = false;
});

// --- Save button ---
saveBtn.addEventListener("click", () => {
  const baseName = currentFile.name.replace(/\.[^.]+$/, "");

  if (currentFile.type.startsWith("image/")) {
    const link = document.createElement("a");
    link.download = baseName + "_clean.png";
    link.href = canvasRes.toDataURL("image/png");
    link.click();
  } else if (window._processedVideoBlob) {
    const ext = window._processedVideoBlob.type.includes("mp4") ? ".mp4" : ".webm";
    const link = document.createElement("a");
    link.download = baseName + "_clean" + ext;
    link.href = URL.createObjectURL(window._processedVideoBlob);
    link.click();
  }
});

// --- Load OpenCV.js from CDN ---
function markReady() {
  if (cvReady) return;
  cvReady = true;
  statusEl.textContent = "Ready. Choose an image or video to get started.";
  if (currentFile) processBtn.disabled = false;
}

function waitForCv() {
  // Poll until cv.Mat exists (WASM fully initialized)
  if (typeof cv !== "undefined" && cv.Mat) {
    markReady();
    return;
  }
  setTimeout(waitForCv, 100);
}

// Set the callback BEFORE loading the script so we don't miss it
window.Module = {
  onRuntimeInitialized: function() { waitForCv(); }
};

const script = document.createElement("script");
script.src = "https://docs.opencv.org/4.9.0/opencv.js";
script.async = true;
script.onload = () => {
  statusEl.textContent = "Initializing OpenCV (WASM)...";
  // Fallback: if onRuntimeInitialized never fires, poll for readiness
  waitForCv();
};
script.onerror = () => {
  statusEl.textContent = "Failed to load OpenCV.js. Check your internet connection and try refreshing.";
};
document.body.appendChild(script);
</script>

</body>
